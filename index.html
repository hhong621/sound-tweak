<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Tweak</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <h1 class="app-title">SOUND TWEAK</h1>

        <div class="top-bar">
            <button type="button" class="bar-btn" id="initial-setup-btn">Initial Setup</button>
            <div id="viz-wrap" aria-hidden="true">
                <canvas id="viz"></canvas>
            </div>
            <button type="button" class="bar-btn" id="note-export-btn">Export Last Played</button>
        </div>

        <div class="mid-row">
            <fieldset class="panel">
                <legend>Gain Node</legend>
                <div class="panel-body">
                    <div class="control-row">
                        <label class="control-label" for="gain-slider">Gain</label>
                        <div class="slider-field">
                            <input type="range" class="control-slider" id="gain-slider" min="0" max="1" step="0.01" value="0.3" aria-label="Gain">
                            <input type="number" class="control-number" id="gain-number" min="0" max="1" step="0.01" value="0.3" aria-label="Gain value">
                        </div>
                    </div>
                    <div class="control-row">
                        <label class="control-label" for="duration-slider">Duration</label>
                        <div class="slider-field">
                            <input type="range" class="control-slider" id="duration-slider" min="0.01" max="2" step="0.01" value="0.2" aria-label="Duration">
                            <input type="number" class="control-number" id="duration-number" min="0.01" max="2" step="0.01" value="0.2" aria-label="Duration value">
                        </div>
                    </div>
                    <div class="control-row toggle-row">
                        <span class="control-label">Sustain</span>
                        <label class="toggle">
                            <input type="checkbox" id="sustain-toggle" aria-label="Sustain on press">
                            <span class="toggle-track" aria-hidden="true"></span>
                        </label>
                    </div>
                </div>
            </fieldset>

            <fieldset class="panel">
                <legend>Biquad Filter</legend>
                <div class="panel-body">
                    <div class="control-row toggle-row">
                        <span class="control-label">Filter</span>
                        <label class="toggle">
                            <input type="checkbox" id="filter-toggle" aria-label="Filter enabled">
                            <span class="toggle-track" aria-hidden="true"></span>
                        </label>
                    </div>
                    <div class="control-row">
                        <span class="control-label">Type</span>
                        <div class="segmented" id="filter-type-group" role="group" aria-label="Filter type">
                            <button type="button" class="segmented-btn is-active" data-value="lowpass">Lowpass</button>
                            <button type="button" class="segmented-btn" data-value="bandpass">Bandpass</button>
                            <button type="button" class="segmented-btn" data-value="highpass">Highpass</button>
                        </div>
                    </div>
                    <div class="control-row">
                        <label class="control-label" for="filter-frequency-slider">Frequency</label>
                        <div class="slider-field">
                            <input type="range" class="control-slider" id="filter-frequency-slider" min="20" max="20000" step="1" value="1000" aria-label="Filter frequency">
                            <input type="number" class="control-number" id="filter-frequency-number" min="20" max="20000" step="1" value="1000" aria-label="Filter frequency value">
                        </div>
                    </div>
                    <div class="control-row">
                        <label class="control-label" for="filter-q-slider">Q</label>
                        <div class="slider-field">
                            <input type="range" class="control-slider" id="filter-q-slider" min="0.1" max="30" step="0.1" value="5" aria-label="Filter Q">
                            <input type="number" class="control-number" id="filter-q-number" min="0.1" max="30" step="0.1" value="5" aria-label="Filter Q value">
                        </div>
                    </div>
                </div>
            </fieldset>
        </div>

        <fieldset class="panel oscillator-panel">
            <legend>Oscillator Node</legend>
            <div class="panel-body oscillator-body">
                <div class="oscillator-top">
                    <div class="oscillator-primary">
                        <div class="control-row">
                            <label class="control-label" for="frequency-slider">Custom Frequency</label>
                            <div class="slider-field">
                                <input type="range" class="control-slider" id="frequency-slider" min="20" max="4000" step="1" value="440" aria-label="Frequency">
                                <input type="number" class="control-number" id="frequency-number" min="20" max="4000" step="1" value="440" aria-label="Frequency value">
                            </div>
                        </div>
                        <button type="button" class="play-btn" id="play-btn">Play</button>
                    </div>
                    <div class="control-row oscillator-type-row">
                        <span class="control-label">Type</span>
                        <div class="segmented" id="oscillator-type-group" role="group" aria-label="Oscillator type">
                            <button type="button" class="segmented-btn is-active" data-value="sine">Sine</button>
                            <button type="button" class="segmented-btn" data-value="square">Square</button>
                            <button type="button" class="segmented-btn" data-value="triangle">Triangle</button>
                            <button type="button" class="segmented-btn" data-value="sawtooth">Sawtooth</button>
                        </div>
                    </div>
                </div>

                <div class="oscillator-main">
                    <div class="readouts">
                        <div class="control-panel">
                            <div class="control-display">
                                <span class="display-label">Octave</span>
                                <span class="control-value" id="octave-display">4</span>
                            </div>
                            <div class="octave-slider-wrap">
                                <div class="octave-slider-ticks" aria-hidden="true"></div>
                                <input type="range" class="control-slider" id="octave-slider" min="0" max="8" step="1" value="4" aria-label="Octave">
                            </div>
                        </div>
                        <div class="control-panel note-panel">
                            <div class="control-display">
                                <span class="display-label">Note</span>
                                <span class="control-value" id="last-note-display" aria-live="polite">—</span>
                            </div>
                        </div>
                    </div>

                    <div id="keyboard-root" aria-label="Note keyboard">
                        <div class="keyboard-sharps">
                            <button type="button" class="piano-key sharp" data-note="C#" data-key="e" style="--sharp-index: 0">
                                <span class="key-label">C#</span>
                                <span class="key-shortcut">e</span>
                            </button>
                            <button type="button" class="piano-key sharp" data-note="D#" data-key="r" style="--sharp-index: 1">
                                <span class="key-label">D#</span>
                                <span class="key-shortcut">r</span>
                            </button>
                            <button type="button" class="piano-key sharp" data-note="F#" data-key="y" style="--sharp-index: 3">
                                <span class="key-label">F#</span>
                                <span class="key-shortcut">y</span>
                            </button>
                            <button type="button" class="piano-key sharp" data-note="G#" data-key="u" style="--sharp-index: 4">
                                <span class="key-label">G#</span>
                                <span class="key-shortcut">u</span>
                            </button>
                            <button type="button" class="piano-key sharp" data-note="A#" data-key="i" style="--sharp-index: 5">
                                <span class="key-label">A#</span>
                                <span class="key-shortcut">i</span>
                            </button>
                        </div>
                        <div class="keyboard-naturals">
                            <button type="button" class="piano-key natural" data-note="C" data-key="s">
                                <span class="key-label">C</span>
                                <span class="key-shortcut">s</span>
                            </button>
                            <button type="button" class="piano-key natural" data-note="D" data-key="d">
                                <span class="key-label">D</span>
                                <span class="key-shortcut">d</span>
                            </button>
                            <button type="button" class="piano-key natural" data-note="E" data-key="f">
                                <span class="key-label">E</span>
                                <span class="key-shortcut guide-key">f</span>
                            </button>
                            <button type="button" class="piano-key natural" data-note="F" data-key="g">
                                <span class="key-label">F</span>
                                <span class="key-shortcut">g</span>
                            </button>
                            <button type="button" class="piano-key natural" data-note="G" data-key="h">
                                <span class="key-label">G</span>
                                <span class="key-shortcut">h</span>
                            </button>
                            <button type="button" class="piano-key natural" data-note="A" data-key="j">
                                <span class="key-label">A</span>
                                <span class="key-shortcut guide-key">j</span>
                            </button>
                            <button type="button" class="piano-key natural" data-note="B" data-key="k">
                                <span class="key-label">B</span>
                                <span class="key-shortcut">k</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </fieldset>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
